services:
  - type: web
    name: nexra-api
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    # We remove the RQ worker because we are using an in-memory mock queue, 
    # and a real RQ worker will crash if it can't connect to a real Redis server.
    startCommand: "uvicorn api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
